            },
            {

                hint: "לָתֵת הַתְרָאָה.",

                    { text: "*הִזְהִיר*", correct: true, rationale: "נָכוֹן מְאוֹד. מַתַּן הַתְרָאָה לִפְנֵי עֲנִישָׁה." },
                    { text: "*הִתִּיר* וְהִרְשָׁה", correct: false, rationale: "'הִתִּיר' זֶה לְהַרְשׁוֹת, וְ'הִתְרָה' זֶה לְהַזְהִיר." },

                hint: "פְּעוּלָּה שֶׁנַּעֲשֵׂית 'בְּמֵזִיד' (בְּכַוָּונָה לְהָרַע).",

                hint: "הָרֶגֶשׁ שֶׁעוֹלֶה כְּשֶׁרוֹאִים מִישֶׁהוּ מִסְכֵּן.",
                answers: [
                    { text: "הִתְעוֹרֵר בּוֹ *כַּעַס*", correct: false, rationale: "מִי שֶׁכּוֹעֵס לֹא נִיגַּשׁ לַעֲזוֹר לְיֶלֶד בּוֹכֶה בְּדֶרֶךְ כְּלַל." },
                    { text: "הִתְעוֹרְרָה בּוֹ *חֶמְלָה*", correct: true, rationale: "מְצוּיָּן. הַתְּגוּבָה שֶׁל עֶזְרָה לְיֶלֶד נוֹבַעַת מֵרַחֲמִים." },
                    { text: "הוּא *נִבְהַל* וּבָרַח", correct: false, rationale: "הוּא 'נִיגַּשׁ לַעֲזוֹר', לֹא בָּרַח." },
                    { text: "הוּא *צָחַק* בְּקוֹל", correct: false, rationale: "סִיטּוּאַצְיָה שֶׁל יֶלֶד בּוֹכֶה לֹא מְעוֹרֶרֶת צְחוֹק." }
                ]
            }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let answeredCorrectly = false;
        let autoAdvanceTimeout;
        let niqqudLevel = 'full'; // ברירת מחדל: מלא, חלקי או ללא

        const questionEl = document.getElementById('question-text');
        const answersContainer = document.getElementById('answers-container');
        const feedbackArea = document.getElementById('feedback-area');
        const feedbackTitle = document.getElementById('feedback-title');
        const feedbackText = document.getElementById('feedback-text');
        const feedbackIcon = document.getElementById('feedback-icon');
        const progressText = document.getElementById('progress-text');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const scoreDisplay = document.getElementById('score-display');
        const quizContainer = document.getElementById('quiz-container');
        const endScreen = document.getElementById('end-screen');
        const finalScore = document.getElementById('final-score');

        // פונקציה חכמה לטיפול בניקוד וכוכביות
        function formatText(text, isQuestion) {
            if (!text) return "";
            let result = text;
            
            if (niqqudLevel === 'full') {
                // שומרים את כל הניקוד
            } else if (niqqudLevel === 'none') {
                // מסירים ניקוד (תווי יוניקוד של ניקוד עברי בלבד) - שומר על אהו"י
                result = result.replace(/[\u0591-\u05C7]/g, '');
            } else if (niqqudLevel === 'partial') {
                // מסירים ניקוד בכל מקום פרט למילים שעטופות בכוכביות
                result = result.replace(/(\*[^*]+\*)|([^*]+)/g, function(match, p1, p2) {
                    if (p1) return p1; // משאיר כוכביות וניקוד
                    if (p2) return p2.replace(/[\u0591-\u05C7]/g, ''); // מסיר ניקוד
                    return match;
                });
            }

            // עיצוב כוכביות
            if (isQuestion) {
                // מדגיש את המילה בשאלה
                result = result.replace(/\*([^*]+)\*/g, '<span class="text-pink-600 font-bold text-2xl px-1">$1</span>');
            } else {
                // בתשובות או רמזים - רק מסיר את הכוכביות לאחר הטיפול בניקוד
                result = result.replace(/\*/g, '');
            }
            
            return result;
        }

        // בחירת רמת הניקוד
        window.setNiqqud = function(level) {
            niqqudLevel = level;
            
            // עדכון כפתורים
            const btns = document.querySelectorAll('.niqqud-btn');
            btns.forEach(btn => {
                btn.classList.remove('bg-white', 'text-pink-600', 'shadow-md');
                btn.classList.add('text-white', 'bg-transparent', 'hover:bg-white/20');
            });
            
            const activeBtn = document.getElementById(`btn-niqqud-${level}`);
            activeBtn.classList.remove('text-white', 'bg-transparent', 'hover:bg-white/20');
            activeBtn.classList.add('bg-white', 'text-pink-600', 'shadow-md');
            
            // טעינה מחדש של הטקסטים
            if (!answeredCorrectly) {
                loadQuestion();
            }
        };

        function initQuiz() {
            currentQuestionIndex = 0;
            score = 0;
            setNiqqud('full'); // קובע התחלה עם ניקוד מלא
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            answeredCorrectly = false;
            
            // עדכון ממשק משתמש
            questionEl.innerHTML = formatText(q.question, true);
            progressText.innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
            scoreDisplay.innerText = `ניקוד: ${score}`;
            
            // עדכון פס התקדמות
            const progressPercentage = ((currentQuestionIndex + 1) / questions.length) * 100;
            progressBarFill.style.width = `${progressPercentage}%`;
            
            // איפוס אזור משוב
            feedbackArea.classList.add('hidden');
            
            // יצירת תשובות
            answersContainer.innerHTML = '';
            
            // ערבוב התשובות
            const shuffledAnswers = [...q.answers].sort(() => Math.random() - 0.5);

            shuffledAnswers.forEach((answer) => {
                const btn = document.createElement('button');
                btn.className = "answer-btn w-full text-right bg-white border-2 border-pink-100 p-4 rounded-2xl hover:border-pink-300 hover:bg-pink-50 focus:outline-none focus:ring-2 focus:ring-pink-400 font-medium text-gray-700 text-lg shadow-sm";
                btn.innerHTML = formatText(answer.text, false);
                btn.onclick = () => handleAnswer(btn, answer, q.hint);
                answersContainer.appendChild(btn);
            });
        }

        function handleAnswer(btn, answer, questionHint) {
            if (answeredCorrectly) return; 

            const allBtns = answersContainer.querySelectorAll('button');
            
            if (answer.correct) {
                // לוגיקה לתשובה נכונה
                answeredCorrectly = true;
                score += 10;
                scoreDisplay.innerText = `ניקוד: ${score}`;
                
                // עיצוב הכפתור
                btn.classList.remove('bg-white', 'border-pink-100', 'hover:border-pink-300', 'hover:bg-pink-50');
                btn.classList.add('bg-green-100', 'border-green-400', 'text-green-800');
                
                // נטרול כל הכפתורים
                allBtns.forEach(b => b.disabled = true);

                // הצגת משוב הצלחה ומעבר אוטומטי
                showFeedback(true, formatText("נָכוֹן מְאוֹד! 🌸", false), formatText(answer.rationale, false));
                
                // מעבר אוטומטי מהיר יותר - 1.5 שניות (1500ms)
                autoAdvanceTimeout = setTimeout(() => {
                    advanceToNextQuestion();
                }, 1500);
                
            } else {
                // לוגיקה לתשובה שגויה
                btn.classList.remove('bg-white', 'border-pink-100', 'hover:border-pink-300', 'hover:bg-pink-50');
                btn.classList.add('bg-red-50', 'border-red-200', 'text-red-700', 'opacity-80');
                
                // נטרול הכפתור השגוי בלבד
                btn.disabled = true;

                // הצגת רמז עם עיצוב הניקוד המתאים
                const hintText = `<b>${formatText("רֶמֶז:", false)}</b> ${formatText(questionHint, false)} <br> ${formatText("נַסּוּ לִבְחוֹר תְּשׁוּבָה אַחֶרֶת.", false)}`;
                showFeedback(false, formatText("לֹא בְּדִיּוּק... 🍂", false), hintText);
            }
        }

        function showFeedback(isSuccess, title, text) {
            feedbackArea.classList.remove('hidden', 'bg-green-50', 'border-green-300', 'bg-red-50', 'border-red-200');
            feedbackIcon.innerText = isSuccess ? '🌺' : '🥀';
            
            if (isSuccess) {
                feedbackArea.classList.add('bg-green-50', 'border-green-300', 'text-green-900');
                feedbackTitle.innerText = title;
                feedbackText.innerHTML = text + `<br><span class='text-sm opacity-75 mt-3 block font-bold'>${formatText("עוֹבֵר אוֹטוֹמָטִית לַשְּׁאֵלָה הַבָּאָה... ⏳", false)}</span>`;
            } else {
                feedbackArea.classList.add('bg-orange-50', 'border-orange-200', 'text-orange-900');
                feedbackTitle.innerText = title;
                feedbackText.innerHTML = text; 
            }
        }

        function advanceToNextQuestion() {
            currentQuestionIndex++;
            if (currentQuestionIndex < questions.length) {
                loadQuestion();
            } else {
                showEndScreen();
            }
        }

        function showEndScreen() {
            quizContainer.classList.add('hidden');
            endScreen.classList.remove('hidden');
            finalScore.innerText = score;
        }

        // התחלה
        initQuiz();

    </script>
</body>
</html>
